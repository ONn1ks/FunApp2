<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Убеги от квадратика</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Убеги от квадратиков</h1>
        <p>
          Управляй кружком с помощью стрелок или клавиш WASD и постарайся
          выжить как можно дольше. Со временем квадратиков становится больше,
          они быстрее, а твой кружок — меньше, но проворнее.
        </p>
        <div class="stats">
          <div><span class="label">Время:</span> <span id="time">0.0</span> c</div>
          <div><span class="label">Квадратиков:</span> <span id="enemy-count">0</span></div>
        </div>
        <button id="restart" class="hidden">Играть снова</button>
      </section>
      <section class="game-area">
        <canvas id="game" width="900" height="600" aria-label="Игровое поле"></canvas>
        <div id="message" class="message hidden"></div>
      </section>
    </main>
    <footer class="footer">
      Сделано для весёлого побега от надоедливых квадратиков!
    </footer>
    <script src="game.js"></script>
  </body>
</html>
